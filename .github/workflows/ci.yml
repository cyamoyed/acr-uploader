name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.25']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Vet
      run: go vet ./...

    - name: Build binary
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -gcflags="all=-l" -o bin/acr-uploader-linux-amd64 main.go
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -gcflags="all=-l" -o bin/acr-uploader-windows-amd64.exe main.go
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -gcflags="all=-l" -o bin/acr-uploader-darwin-arm64 main.go
        fi
      shell: bash

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: acr-uploader-${{ matrix.os }}
        path: bin/
